<!-- ── Test runner ──────────────────────────────────────────────────────────── -->
<script>
(function () {
  var pass = 0, fail = 0;
  var suites = {};

  function suite(name) { suites[name] = []; return name; }
  function assert(suiteName, label, condition, detail) {
    suites[suiteName].push({ label: label, ok: !!condition, detail: detail || "" });
    if (condition) pass++; else fail++;
  }

  // ── SUITE: Utils ─────────────────────────────────────────────────────────
  var S = suite("utils");
  assert(S, "shuffle returns same length", shuffle([1,2,3,4]).length === 4);
  var _shuffleIn = [1, 2, 3];
  var _shuffleOut = shuffle(_shuffleIn);
  assert(S, "shuffle is a copy", _shuffleOut !== _shuffleIn);
  assert(S, "isCooldownActive(past)",      !isCooldownActive(Date.now() - 1000));
  assert(S, "isCooldownActive(future)",    isCooldownActive(Date.now() + 1000));
  assert(S, "todayKey is YYYY-MM-DD",      /^\d{4}-\d{2}-\d{2}$/.test(todayKey()));
  assert(S, "formatMsShort 90s",           formatMsShort(90000) === "2 min");
  assert(S, "formatDurationCountdown 65s", formatDurationCountdown(65000) === "1m 5s");
  assert(S, "escapeHtml sanitises <",      escapeHtml("<b>hi</b>") === "&lt;b&gt;hi&lt;/b&gt;");
  assert(S, "normalizeQuestionText trims", normalizeQuestionText("  hello  ") === "hello");
  assert(S, "getQuestionKey id path",      getQuestionKey({ id: "q42" }, "1") === "q42");
  assert(S, "getQuestionKey text path",    getQuestionKey({ question: "A B" }, "1").includes("A B"));

  // ── SUITE: Crypto round-trip ──────────────────────────────────────────────
  var SC = suite("crypto");
  encryptPayload("testpassword", '{"x":1}').then(function (code) {
    return decryptPayload("testpassword", code).then(function (plain) {
      return { code: code, plain: plain };
    });
  }).then(function (r) {
    assert(SC, "encrypt→decrypt round-trip", r.plain === '{"x":1}');
    return decryptPayload("wrongpass", r.code);
  }).then(
    function () {
      assert(SC, "wrong password rejects (v1 AES)", false, "decrypt unexpectedly succeeded");
    },
    function () {
      assert(SC, "wrong password rejects (v1 AES)", true);
    }
  ).then(function () {
    return decryptPayload("wrongpass", "v1-plain:" + btoa("hello"));
  }).then(function (plain2) {
    assert(SC, "v1-plain ignores password (by design)", plain2 === "hello");
    renderResults();
  }).catch(function (e) {
    assert(SC, "crypto test threw", false, e.message);
    renderResults();
  });

  // ── SUITE: State schema ───────────────────────────────────────────────────
  var SS = suite("state");
  var ds = defaultState();
  assert(SS, "defaultState has xp:0",      ds.xp === 0);
  assert(SS, "defaultState has xpLedger[]", Array.isArray(ds.xpLedger));
  var ns = normalizeState({ xp: "42", xpLedger: null });
  assert(SS, "normalizeState coerces xp",   ns.xp === 42);
  assert(SS, "normalizeState fixes ledger", Array.isArray(ns.xpLedger));

  // ── SUITE: XP ledger ─────────────────────────────────────────────────────
  var SX = suite("xp");
  var xpBefore = state.xp;
  addXp(10, { activityType: "quiz", sourceId: "test:1", reason: "unit_test" });
  assert(SX, "addXp increases state.xp",    state.xp === xpBefore + 10);
  assert(SX, "addXp appends ledger entry",  state.xpLedger.length > 0);
  var lastEntry = state.xpLedger[state.xpLedger.length - 1];
  assert(SX, "ledger entry has deltaXp",    lastEntry.deltaXp === 10);
  assert(SX, "ledger entry has activityType", lastEntry.activityType === "quiz");

  var _xpEventFired = false;
  window.addEventListener("levelup:xp-gained", function handler(e) {
    _xpEventFired = e.detail && e.detail.deltaXp > 0;
    window.removeEventListener("levelup:xp-gained", handler);
  });
  addXp(5, { activityType: "flash", sourceId: "test:2", reason: "unit_test_event" });
  assert(SX, "levelup:xp-gained event fires", _xpEventFired);

  var _stateSavedFired = false;
  window.addEventListener("levelup:state-saved", function handler2() {
    _stateSavedFired = true;
    window.removeEventListener("levelup:state-saved", handler2);
  });
  saveState();
  assert(SX, "levelup:state-saved event fires", _stateSavedFired);

  // ── SUITE: Daily challenge ────────────────────────────────────────────────
  var SD = suite("daily");
  var dc = ensureDailyChallenge();
  assert(SD, "ensureDailyChallenge returns object", dc && typeof dc === "object");
  assert(SD, "daily.date is today",                 dc.date === todayKey());
  markDailyAnswered(1);
  assert(SD, "markDailyAnswered increments",        ensureDailyChallenge().answered >= 1);

  // ── SUITE: Topic meta + unlock ────────────────────────────────────────────
  var ST = suite("topics");
  assert(ST, "getTopicMeta('1') finds topic",   getTopicMeta("1") !== null);
  assert(ST, "getTopicMeta('999') returns null", getTopicMeta("999") === null);
  assert(ST, "topicIndex('1') is 0",            topicIndex("1") === 0);
  state.unlockAll = true;
  assert(ST, "isUnlocked when unlockAll=true",  isUnlocked("2"));
  state.unlockAll = false;
  assert(ST, "isUnlocked(0) always true",       isUnlocked("1"));
  assert(ST, "buildThemeIndex produces themeOrder", themeOrder.length > 0);
  assert(ST, "themesByKey has entries",             Object.keys(themesByKey).length > 0);

  // ── SUITE: Shop helpers ───────────────────────────────────────────────────
  var SH = suite("shop");
  assert(SH, "getTodayIsoDate is YYYY-MM-DD",   /^\d{4}-\d{2}-\d{2}$/.test(getTodayIsoDate()));
  assert(SH, "getRewardDailyMax uses default",  getRewardDailyMax({}) === DEFAULT_REWARD_DAILY_MAX);
  assert(SH, "getRewardDailyMax reads field",   getRewardDailyMax({ dailyMax: 3 }) === 3);

  // ── SUITE: Shop contract (server snapshot + rules; mocked data, no network) ─
  var SCshop = suite("shop-contract");
  var _shopBk = {
    xp: state.xp,
    xpLedger: state.xpLedger.slice(),
    purchaseLedger: (state.purchaseLedger || []).slice(),
    serverDailyCounts: JSON.parse(JSON.stringify(state.serverDailyCounts || {})),
    serverCouponsToday: (state.serverCouponsToday || []).slice(),
    shopCouponsLoaded: state.shopCouponsLoaded,
    shopLastSyncAt: state.shopLastSyncAt,
  };
  function _restoreShopContract() {
    state.xp = _shopBk.xp;
    state.xpLedger = _shopBk.xpLedger.slice();
    state.purchaseLedger = _shopBk.purchaseLedger.slice();
    state.serverDailyCounts = JSON.parse(JSON.stringify(_shopBk.serverDailyCounts));
    state.serverCouponsToday = _shopBk.serverCouponsToday.slice();
    state.shopCouponsLoaded = _shopBk.shopCouponsLoaded;
    state.shopLastSyncAt = _shopBk.shopLastSyncAt;
  }
  var _todayShop = getTodayIsoDate();
  var _isoPurchase = _todayShop + "T15:30:00.000Z";

  var _insufMsg = getServerPurchaseErrorMessage("insufficient_xp", { balance: 10, cost: 50 });
  assert(SCshop, "getServerPurchaseErrorMessage insufficient_xp", /Server XP balance is 10/.test(_insufMsg) && /50/.test(_insufMsg));
  assert(
    SCshop,
    "getServerPurchaseErrorMessage daily_limit",
    getServerPurchaseErrorMessage("daily_limit_reached", null).indexOf("Daily reward limit") >= 0
  );

  state.xp = 999;
  assert(SCshop, "applyShopSnapshot !ok is no-op", !applyShopSnapshot({ ok: false, xp_balance: 1 }) && state.xp === 999);
  assert(
    SCshop,
    "applyShopSnapshot merges xp_balance (server truth)",
    applyShopSnapshot({ ok: true, xp_balance: 401, coupons_today: [], date: _todayShop, counts: [] }) && state.xp === 401
  );

  applyShopSnapshot({
    ok: true,
    xp_balance: 401,
    date: _todayShop,
    counts: [{ reward_id: "reward_x", count: 2 }],
    coupons_today: [
      {
        reward_id: "reward_x",
        reward_label: "Test treat",
        xp_cost: 25,
        purchased_at: _isoPurchase,
        client_purchase_id: "cid-1",
        coupon_code: "ZZ99",
      },
    ],
  });
  assert(SCshop, "applyShopSnapshot server daily counts", Number(state.serverDailyCounts.reward_x[_todayShop]) === 2);
  assert(SCshop, "applyShopSnapshot coupons_today length", (state.serverCouponsToday || []).length === 1);
  assert(
    SCshop,
    "applyShopSnapshot coupon fields normalized",
    state.serverCouponsToday[0].id === "reward_x" &&
      state.serverCouponsToday[0].couponCode === "ZZ99" &&
      state.serverCouponsToday[0].xp === 25
  );

  state.purchaseLedger = [{ couponId: "only-local", ts: Date.now(), date: _todayShop }];
  state.serverDailyCounts = {};
  assert(SCshop, "getRewardPurchasesOnDate local ledger", getRewardPurchasesOnDate("only-local", _todayShop) === 1);
  state.serverDailyCounts["only-local"] = {};
  state.serverDailyCounts["only-local"][_todayShop] = 5;
  assert(SCshop, "getRewardPurchasesOnDate max(local,server)", getRewardPurchasesOnDate("only-local", _todayShop) === 5);

  state.xp = 200;
  var _pe = recordPurchaseEntry({ id: "r1", label: "L", xp: 50 });
  assert(SCshop, "recordPurchaseEntry balanceBefore", _pe.balanceBefore === 200);
  assert(SCshop, "recordPurchaseEntry balanceAfter", _pe.balanceAfter === 150);

  var _nowLed = Date.now();
  state.xpLedger = [
    { ts: _nowLed, deltaXp: 5, activityType: "quiz", topicId: "1", subjectId: SUBJECT_ID },
    { ts: _nowLed, deltaXp: 3, activityType: "flash", topicId: "2", subjectId: SUBJECT_ID },
  ];
  var _cov = canPurchaseReward();
  assert(SCshop, "canPurchaseReward when coverage met", _cov.ok === true && _cov.cov.topicCount >= 2);

  assert(SCshop, "getPurchaseEffectiveCooldownMs under daily cap", getPurchaseEffectiveCooldownMs("z9", 3, 0) === 0);
  state.purchaseLedger = [{ couponId: "c1", ts: Date.now(), date: _todayShop }];
  var _effCd = getPurchaseEffectiveCooldownMs("c1", 1, 1);
  assert(SCshop, "getPurchaseEffectiveCooldownMs at daily max uses cooldown", _effCd > 0 && _effCd <= PURCHASE_REPEAT_COOLDOWN_MS);

  state.xp = 600;
  applyShopSnapshot({
    ok: true,
    xp_balance: 100,
    coupons_today: state.serverCouponsToday || [],
    date: _todayShop,
    counts: [{ reward_id: "reward_x", count: 2 }],
  });
  assert(SCshop, "snapshot xp overwrites local (post-RPC reconcile)", state.xp === 100);

  _restoreShopContract();

  // ── SUITE: Quiz scoring ───────────────────────────────────────────────────
  var SQ = suite("quiz");
  assert(SQ, "getQuestionXpMeta new bucket",    getQuestionXpMeta("new",  {}).delta === 10);
  assert(SQ, "getQuestionXpMeta weak bucket",   getQuestionXpMeta("weak", {}).delta === 11);
  assert(SQ, "getRepeatAttemptMultiplier no xp", getRepeatAttemptMultiplier({ topicId: "1", activityType: "quiz" }) === 1);
  assert(SQ, "LevelupExtendedQuiz written shell empty", LevelupExtendedQuiz.renderWrittenShell({ id: "z", extendedQuestions: [] }).indexOf("No written questions") >= 0);
  var _exHtml = LevelupExtendedQuiz.renderWrittenShell({
    id: "t9",
    extendedQuestions: [
      {
        id: "e1",
        commandWord: "State",
        marks: 2,
        prompt: "Hello **bold**",
        rubric: ["one point"],
        modelAnswer: "Ans line",
      },
    ],
  });
  assert(
    SQ,
    "written shell html",
    _exHtml.indexOf("data-panel=\"written\"") >= 0 &&
      _exHtml.indexOf("written-step-root") >= 0 &&
      _exHtml.indexOf("State") >= 0 &&
      _exHtml.indexOf("extended-q-textarea") >= 0 &&
      _exHtml.indexOf("extended-q-rubric-btn") >= 0 &&
      _exHtml.indexOf("extended-q-model-btn") >= 0 &&
      _exHtml.indexOf("data-min-model=") >= 0
  );
  var _goodPara =
    "Laboratory investigation systematically measures temperature concentration apparatus methodology observations recording reproducible measurements throughout experimental procedure documentation analysis validity reliability precision accuracy consistently yields trustworthy scientific conclusions documented thoroughly.";
  assert(SQ, "written heuristic accepts solid draft", LevelupExtendedQuiz.qualifyWrittenOnlyHeuristic(_goodPara, 60000) === true);
  assert(SQ, "written heuristic rejects short", LevelupExtendedQuiz.qualifyWrittenOnlyHeuristic("too short", 60000) === false);
  assert(SQ, "written heuristic rejects repeat spam", LevelupExtendedQuiz.qualifyWrittenOnlyHeuristic(new Array(80).join("a"), 60000) === false);

  // ── SUITE: LLM client + cache (mock fetch) ─────────────────────────────────
  var SL = suite("llm");
  var _fetchCalls = 0;
  var _realFetch = window.fetch;

  LevelupLlmConfig.save(
    LevelupLlmConfig.defaultConfig({
      enabled: true,
      proxyBaseUrl: "http://127.0.0.1:8080",
      appToken: "test-token",
      features: { quizExplain: true },
      cache: { maxEntries: 50, ttlDays: 60 },
    })
  );
  assert(SL, "LevelupLlmConfig.isProxyReady", LevelupLlmConfig.isProxyReady() === true);
  assert(SL, "LevelupLlmConfig.isQuizExplainEnabled", LevelupLlmConfig.isQuizExplainEnabled() === true);

  var _q = { id: "q-llm-1", question: "Why?", options: ["A", "B"], correctIndex: 1, explanation: "hint" };
  var _ck = LevelupLlmQuizCache.makeQuizKey(_q, "9", 1, 0, "test-ver");
  assert(SL, "llm cache key stable", _ck.indexOf("q-llm-1") >= 0 && _ck.indexOf("|c1|s0|") >= 0);

  LevelupLlmQuizCache._clearForTests();
  var _cfg = LevelupLlmConfig.get();
  assert(SL, "cache miss first", LevelupLlmQuizCache.get(_cfg, _ck) === null);

  window.fetch = function () {
    return Promise.resolve({
      ok: false,
      status: 401,
      text: function () {
        return Promise.resolve("{}");
      },
    });
  };
  LevelupLlmClient.quizExplain(LevelupLlmConfig.getClientConfig(), {
    question: _q.question,
    options: _q.options,
    correct_index: 1,
    chosen_index: 0,
  }).then(function (ru) {
    assert(SL, "401 → unauthorized + token hint", ru.code === "unauthorized" && ru.message.indexOf("token") >= 0);
    _fetchCalls = 0;
    window.fetch = function (url, init) {
      var u = String(url || "");
      if (u.indexOf("/llm/quiz-explain") >= 0) {
        _fetchCalls++;
        return Promise.resolve({
          ok: true,
          status: 200,
          text: function () {
            return Promise.resolve(
              JSON.stringify({
                ok: true,
                parsed: {
                  wrong_choice_explained: "Because energy is conserved.",
                  correct_logic: "Use the mark scheme.",
                  examiners_phrase: "State the law.",
                  try_again_question: null,
                },
                raw_content: "{}",
                parse_error: null,
              })
            );
          },
        });
      }
      if (typeof _realFetch === "function") return _realFetch.apply(this, arguments);
      return Promise.reject(new Error("no fetch"));
    };
    return LevelupLlmClient.quizExplain(LevelupLlmConfig.getClientConfig(), {
      question: _q.question,
      options: _q.options,
      correct_index: 1,
      chosen_index: 0,
      canonical_hint: "hint",
    });
  }).then(function (r1) {
    assert(SL, "quizExplain ok", r1.ok === true && r1.data && r1.data.parsed);
    assert(SL, "fetch called once", _fetchCalls === 1);
    LevelupLlmQuizCache.set(_cfg, _ck, r1.data);
    assert(SL, "cache stores API payload", LevelupLlmQuizCache.get(_cfg, _ck).parsed.wrong_choice_explained.length > 0);
    var _small = LevelupLlmConfig.defaultConfig({ cache: { maxEntries: 2, ttlDays: 60 } });
    LevelupLlmQuizCache._clearForTests();
    LevelupLlmQuizCache.set(_small, "k1", { n: 1 });
    LevelupLlmQuizCache.set(_small, "k2", { n: 2 });
    LevelupLlmQuizCache.set(_small, "k3", { n: 3 });
    assert(SL, "LRU evicts oldest", LevelupLlmQuizCache.get(_small, "k1") === null);
    assert(SL, "LRU keeps newest", LevelupLlmQuizCache.get(_small, "k3").n === 3);
    window.fetch = _realFetch;
    renderResults();
  }).catch(function (e) {
    assert(SL, "llm async suite", false, e.message);
    window.fetch = _realFetch;
    renderResults();
  });

  // ── SUITE: State persistence round-trip ──────────────────────────────────
  var SP = suite("persistence");
  saveState();
  var savedRaw = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
  assert(SP, "saveState writes to localStorage", savedRaw.xp !== undefined);
  var ps = portableState();
  assert(SP, "portableState has xp",           ps.xp !== undefined);
  assert(SP, "portableState has xpLedger",     Array.isArray(ps.xpLedger));
  applyPortableState({ xp: 9999 });
  assert(SP, "applyPortableState merges xp",   state.xp === 9999);
  applyPortableState({ xp: xpBefore });  // restore

  // crypto tests are async — renderResults will be called from the .then() above
  // but render immediately for sync suites so user sees partial output fast
  renderResults();

  // ── SUITE: Supabase smoke (async) ─────────────────────────────────────────
  var SDB = suite("supabase");
  var sbLog = document.getElementById("supabase-log");
  (async function () {
    try {
      sbLog.textContent = "Connecting to Supabase...";
      var sb = window.supabase && window.supabase.createClient(
        window.SUPABASE_URL, window.SUPABASE_ANON_KEY
      );
      if (!sb) throw new Error("supabase CDN not loaded");
      // Fetch the known test profile (read-only SELECT)
      var res = await sb.from("profiles").select("id,device_id,display_name").eq("id", "baafd63b-7720-44d9-b925-e67fca8e43b1").maybeSingle();
      assert(SDB, "Supabase: no fetch error", !res.error, res.error && res.error.message);
      // Anon + RLS often returns null with no error — still a useful smoke (client + URL + key work).
      if (res.data) {
        assert(SDB, "Supabase: test profile id", res.data.id === "baafd63b-7720-44d9-b925-e67fca8e43b1");
        assert(SDB, "Supabase: device_id present", !!res.data.device_id);
      } else {
        assert(SDB, "Supabase: profile row visible to anon", true, "null row — RLS or UUID not in project (OK for smoke)");
      }
      sbLog.textContent = "Supabase response:\n" + JSON.stringify(res, null, 2);
    } catch (e) {
      assert(SDB, "Supabase: smoke test", false, e.message);
      sbLog.textContent = "Supabase error: " + e.message;
    }
    renderResults();
  })();

  function renderResults() {
    var container = document.getElementById("results");
    container.innerHTML = Object.entries(suites).map(function (entry) {
      var name  = entry[0];
      var tests = entry[1];
      var rows  = tests.map(function (t) {
        return "<div class='result " + (t.ok ? "pass" : "fail") + "'>" +
          "<span class='icon'>" + (t.ok ? "✅" : "❌") + "</span>" +
          "<span>" + t.label + (t.detail ? " <em style='color:#9ca3af'>(" + t.detail + ")</em>" : "") + "</span>" +
        "</div>";
      }).join("");
      return "<div class='suite'><h2>" + name + "</h2>" + rows + "</div>";
    }).join("");
    var total = pass + fail;
    document.getElementById("summary").textContent = pass + " / " + total + " tests passing" + (fail ? " — " + fail + " FAILING" : " ✅");
    document.getElementById("summary").style.color = fail ? "#f87171" : "#34d399";
  }
})();
</script>
</body>
</html>
