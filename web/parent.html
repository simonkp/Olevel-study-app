<!DOCTYPE html>
<html lang="en" data-levelup-build="2026-04-16-00">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LevelUp! Parent Dashboard</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <!-- Analytics: set data-website-id to your Umami site ID before going live -->
  <script async src="https://analytics.umami.is/script.js"
          data-website-id="UMAMI_WEBSITE_ID"
          data-domains="levelupstudyhub.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root { --bg:#060b1a; --card:#0f172a; --border:#23314a; --text:#e2e8f0; --muted:#94a3b8; --accent:#5eead4; --accent2:#a78bfa; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:Outfit,system-ui,sans-serif; background:radial-gradient(circle at top,#111827,#020617); color:var(--text); min-height:100vh; }
    .shell { max-width:960px; margin:0 auto; padding:24px 16px 40px; }

    /* Auth gate */
    .auth-gate { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:60vh; gap:16px; text-align:center; }
    .auth-gate h2 { margin:0; font-size:1.6rem; }
    .auth-gate p { margin:0; color:var(--muted); max-width:380px; }
    .btn-google { display:inline-flex; align-items:center; gap:10px; padding:12px 22px; background:#fff; color:#1a1a1a; border:none; border-radius:10px; font-family:inherit; font-size:1rem; font-weight:600; cursor:pointer; box-shadow:0 2px 8px rgba(0,0,0,.25); }
    .btn-google svg { width:20px; height:20px; flex:0 0 20px; }
    .btn-google:hover { background:#f3f4f6; }

    /* Topbar */
    .topbar { display:flex; align-items:center; justify-content:space-between; gap:12px; padding:12px 0 18px; flex-wrap:wrap; }
    .topbar-brand { display:flex; align-items:center; gap:8px; }
    .home-link { display:inline-flex; align-items:center; gap:6px; text-decoration:none; color:var(--accent); font-size:0.9rem; font-weight:600; border:1px solid #2a3a57; border-radius:10px; padding:7px 12px; background:#0b1220; }
    .home-link:hover { border-color:var(--accent); }
    .topbar-right { display:flex; align-items:center; gap:10px; }
    .topbar-avatar { width:32px; height:32px; border-radius:50%; background:linear-gradient(135deg,var(--accent),var(--accent2)); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:.9rem; color:#000; flex:0 0 32px; }
    .topbar-name { font-size:.9rem; color:var(--muted); }
    .btn-signout { border:1px solid #2a3a57; background:#0b1220; color:#94a3b8; border-radius:8px; padding:6px 12px; font:inherit; font-size:.8rem; cursor:pointer; }
    .btn-signout:hover { border-color:#5f7397; color:var(--text); }

    .page-title { margin:0 0 16px; font-size:1.8rem; }
    .hint-text { color:var(--muted); font-size:.9rem; }
    .card { border:1px solid var(--border); background:rgba(15,23,42,.9); border-radius:14px; padding:14px; margin-bottom:12px; }
    .status-msg { color:var(--muted); font-size:.9rem; margin-top:6px; }

    /* Student cards */
    .student-card { border:1px solid #1f2a40; border-radius:12px; padding:10px 12px; background:#0b1220; margin-top:10px; }
    .student-toggle { width:100%; border:none; background:transparent; color:inherit; padding:0; text-align:left; cursor:pointer; }
    .student-head { display:flex; gap:10px; align-items:flex-start; justify-content:space-between; flex-wrap:wrap; }
    .student-card h3 { margin:0 0 4px; font-size:1rem; }
    .name-row { display:flex; gap:8px; align-items:center; }
    .student-avatar { width:28px; height:28px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; background:linear-gradient(135deg,#5eead4,#a78bfa); color:#000; font-size:.8rem; font-weight:700; flex:0 0 28px; }
    .student-avatar img { width:100%; height:100%; border-radius:50%; object-fit:cover; }
    .divider-dot { color:#5f7397; margin:0 6px; }
    .student-meta { margin:0; color:var(--muted); font-size:.82rem; }
    .student-summary { display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-top:8px; }
    .student-expand { margin-left:auto; color:var(--accent); font-size:.8rem; border:1px solid #2a3a57; border-radius:999px; padding:2px 8px; }
    .student-details { margin-top:10px; }

    .stat-grid { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:8px; margin-bottom:10px; }
    .stat-grid .chip { display:block; text-align:center; }

    .chips { display:flex; flex-wrap:wrap; gap:6px; }
    .chip { border:1px solid #273449; border-radius:999px; padding:3px 8px; font-size:.78rem; color:#cbd5e1; }
    .chip.ok { border-color:#1e4d3a; background:#0b2518; color:#4ade80; }
    .chip.warn { border-color:#4d3a1e; background:#251c0b; color:#fb923c; }
    .chip.locked { border-color:#4d1e2a; background:#25080f; color:#f87171; }
    .details { margin-top:10px; display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:10px; }
    .mini { border:1px solid #1f2a40; border-radius:10px; padding:10px; background:#070d1a; }
    .mini h4 { margin:0 0 6px; font-size:.9rem; color:#cbd5e1; }

    /* Summary modal */
    .summary-backdrop { position:fixed; inset:0; background:rgba(5,7,22,.82); z-index:100; display:flex; align-items:flex-start; justify-content:center; padding:24px 12px; overflow:auto; }
    .summary-backdrop[hidden] { display:none !important; }
    .summary-panel { max-width:640px; width:100%; border:1px solid var(--border); border-radius:14px; background:#0f172a; padding:18px; color:var(--text); box-shadow:0 24px 48px rgba(0,0,0,.45); }
    .summary-panel h2 { margin:0 0 8px; font-size:1.2rem; color:var(--accent); }
    .summary-body { font-size:.88rem; line-height:1.5; }
    .summary-body h3 { margin:16px 0 6px; font-size:.95rem; color:#cbd5e1; }
    .summary-body ul { margin:4px 0 0 18px; padding:0; }
    .summary-foot { margin-top:14px; padding-top:12px; border-top:1px solid #23314a; font-size:.8rem; color:var(--muted); }
    .summary-close { float:right; margin:0 0 8px 8px; border:1px solid #2a3a57; background:#0b1220; color:#94a3b8; border-radius:8px; padding:5px 10px; font:inherit; font-size:.8rem; cursor:pointer; }

    .btn-summary { border:1px solid #2d6a5c; color:var(--accent); background:#0d1f1c; border-radius:8px; padding:6px 12px; font:inherit; font-size:.82rem; cursor:pointer; margin-top:8px; }

    @media (max-width:760px) {
      .shell { padding:16px 10px 28px; }
      .stat-grid { grid-template-columns:repeat(2,minmax(0,1fr)); }
      .details { grid-template-columns:1fr; }
      .student-expand { margin-left:0; }
      .topbar { padding-bottom:12px; }
    }
  </style>
</head>
<body>
  <div class="shell">

    <!-- Auth gate (shown when signed out) -->
    <div id="auth-gate" class="auth-gate" hidden>
      <h2>Parent Dashboard</h2>
      <p>Sign in with your Google account to monitor your students' progress.</p>
      <button type="button" id="btn-google-signin" class="btn-google">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google
      </button>
      <p id="auth-error" class="hint-text" style="color:#f87171;" hidden></p>
    </div>

    <!-- Dashboard (shown when signed in) -->
    <div id="dashboard" hidden>
      <div class="topbar">
        <a class="home-link" href="index.html">← LevelUp home</a>
        <div class="topbar-right">
          <div class="topbar-avatar" id="parent-avatar">P</div>
          <span class="topbar-name" id="parent-name"></span>
          <button type="button" id="btn-signout" class="btn-signout">Sign out</button>
        </div>
      </div>

      <h1 class="page-title">Parent Dashboard</h1>

      <div class="card">
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;">
          <p class="status-msg" id="status">Loading your students…</p>
          <button type="button" id="btn-refresh" style="border:1px solid #2a3a57;background:#0b1220;color:#94a3b8;border-radius:8px;padding:7px 14px;font:inherit;font-size:.85rem;cursor:pointer;">Refresh</button>
        </div>
      </div>

      <div class="card">
        <div id="student-cards">
          <p class="hint-text">Loading…</p>
        </div>
      </div>
    </div>

    <!-- Study summary modal -->
    <div id="study-summary-modal" class="summary-backdrop" hidden role="dialog" aria-modal="true" aria-labelledby="study-summary-title">
      <div class="summary-panel">
        <button type="button" class="summary-close" id="study-summary-close">Close</button>
        <h2 id="study-summary-title">Study summary</h2>
        <div class="summary-body" id="study-summary-body"></div>
        <p class="summary-foot" id="study-summary-foot"></p>
      </div>
    </div>
  </div>

  <script src="js/shell/asset-version.js"></script>
  <script src="js/shell/write-parent-tail-scripts.js"></script>
</body>
</html>
