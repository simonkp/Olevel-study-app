<!DOCTYPE html>
<html lang="en" data-levelup-build="2026-04-17-02">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1020" />
  <title>Parent dashboard · LevelUp</title>
  <meta name="description" content="See your students' progress, strengths and gaps on LevelUp." />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <script async src="https://analytics.umami.is/script.js"
          data-website-id="UMAMI_WEBSITE_ID"
          data-domains="levelupstudyhub.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="js/shell/asset-version.js"></script>
  <link rel="stylesheet" href="css/app-shell.css" />
  <style>
    .gate {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      gap: 16px;
      text-align: center;
      padding: 32px 0;
    }
    .gate h1 { margin: 0; font-size: clamp(1.6rem, 4vw, 2.4rem); }
    .gate p { margin: 0; color: var(--ink-dim); max-width: 42ch; line-height: 1.5; }

    .status-card {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-radius: var(--radius);
      border: 1px solid var(--line-soft);
      background: rgba(255, 255, 255, 0.02);
      margin-bottom: 16px;
    }
    .status-card__text { color: var(--ink-dim); font-size: 14px; margin: 0; }

    .students { display: flex; flex-direction: column; gap: 14px; }
    .student-card {
      border: 1px solid var(--line-soft);
      background: var(--card);
      border-radius: var(--radius-lg);
      padding: 16px;
      transition: border-color 200ms var(--ease);
    }
    .student-card:hover { border-color: rgba(129, 140, 248, 0.4); }
    .student-toggle { width: 100%; display: block; text-align: left; cursor: pointer; padding: 0; }

    .student-head {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      justify-content: space-between;
      flex-wrap: wrap;
    }
    .name-row { display: flex; gap: 10px; align-items: center; }
    .student-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      background: var(--brand-grad);
      color: #0b1020;
      font-size: 14px; font-weight: 800;
      flex: 0 0 36px; overflow: hidden;
    }
    .student-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .student-card h3 { margin: 0; font-size: 1rem; font-weight: 700; }
    .divider-dot { color: var(--ink-muted); margin: 0 6px; }
    .student-meta { margin: 4px 0 0; color: var(--ink-muted); font-size: 13px; }

    .student-summary { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-top: 10px; }
    .student-expand {
      margin-left: auto;
      color: var(--accent);
      font-size: 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 10px;
      background: rgba(255, 255, 255, 0.03);
    }

    .student-details { margin-top: 14px; display: none; }
    .student-card[data-expanded="true"] .student-details { display: block; }

    .stat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 12px; }
    @media (min-width: 720px) { .stat-grid { grid-template-columns: repeat(4, 1fr); } }
    .stat-grid .chip { text-align: center; padding: 10px 12px; }

    .chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.02);
      border-radius: 10px;
      padding: 6px 10px;
      font-size: 12px;
      color: var(--ink-dim);
      font-weight: 500;
    }
    .chip.ok    { border-color: rgba(110, 231, 183, 0.4); background: rgba(110, 231, 183, 0.1); color: #6ee7b7; }
    .chip.warn  { border-color: rgba(251, 191, 36, 0.4); background: rgba(251, 191, 36, 0.1); color: #fbbf24; }
    .chip.locked { border-color: rgba(248, 113, 113, 0.4); background: rgba(248, 113, 113, 0.1); color: #f87171; }

    .details { margin-top: 12px; display: grid; gap: 10px; grid-template-columns: 1fr; }
    @media (min-width: 720px) { .details { grid-template-columns: repeat(2, 1fr); } }
    .mini {
      border: 1px solid var(--line-soft);
      background: rgba(255, 255, 255, 0.02);
      border-radius: var(--radius);
      padding: 12px 14px;
    }
    .mini h4 { margin: 0 0 8px; font-size: 13px; font-weight: 700; color: var(--ink-dim); }
    .mini.full { grid-column: 1 / -1; }

    /* Activity table (today/week/month) */
    .activity-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .activity-table th, .activity-table td { padding: 8px 10px; text-align: center; border-bottom: 1px solid var(--line-soft); }
    .activity-table thead th { font-weight: 700; color: var(--ink-muted); text-transform: uppercase; font-size: 11px; letter-spacing: 0.08em; }
    .activity-table tbody th { text-align: left; font-weight: 600; color: var(--ink-dim); }
    .activity-table tbody td { font-family: var(--mono, ui-monospace, Menlo, monospace); font-weight: 700; }
    .activity-table tbody tr:last-child th, .activity-table tbody tr:last-child td { border-bottom: 0; }

    /* Rewards editor */
    .rewards-block h4 { margin-top: 4px; }
    .rewards-list { list-style: none; margin: 10px 0; padding: 0; display: flex; flex-direction: column; gap: 8px; }
    .reward-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px;
      align-items: center;
      border: 1px solid var(--line-soft);
      background: rgba(255,255,255,0.02);
      border-radius: 10px;
      padding: 10px 12px;
    }
    @media (max-width: 560px) {
      .reward-row { grid-template-columns: 1fr; }
      .reward-actions { justify-self: start; }
    }
    .reward-main strong { font-weight: 600; }
    .reward-meta { display: flex; gap: 6px; }
    .reward-actions { display: flex; gap: 6px; }
    .btn-ghost {
      border: 1px solid var(--line);
      background: transparent;
      color: var(--ink-dim);
      border-radius: 8px;
      padding: 6px 10px;
      font: inherit;
      font-size: 12px;
      cursor: pointer;
    }
    .btn-ghost:hover { color: var(--ink); border-color: var(--line-bright, rgba(255,255,255,0.2)); }
    .btn-ghost.danger { color: #f87171; border-color: rgba(248,113,113,0.4); }
    .btn-ghost.danger:hover { background: rgba(248,113,113,0.08); }
    .reward-form {
      display: grid;
      grid-template-columns: 1fr 120px 1fr auto;
      gap: 8px;
      margin-top: 12px;
    }
    @media (max-width: 720px) { .reward-form { grid-template-columns: 1fr; } }
    .reward-form input {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.03);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--ink);
      font: inherit;
      font-size: 14px;
    }
    .reward-form input:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
    .btn-primary {
      border: 0;
      background: var(--brand-grad, linear-gradient(135deg, #6ee7b7, #a78bfa));
      color: #0b1020;
      border-radius: 10px;
      padding: 10px 16px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-summary {
      border: 1px solid rgba(110, 231, 183, 0.4);
      color: #6ee7b7;
      background: rgba(110, 231, 183, 0.08);
      border-radius: 10px;
      padding: 8px 14px;
      font: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
    }
    .btn-summary:hover { background: rgba(110, 231, 183, 0.14); }

    /* Summary modal */
    .summary-backdrop {
      position: fixed; inset: 0;
      background: rgba(5, 8, 22, 0.8);
      z-index: 80;
      display: flex; align-items: flex-start; justify-content: center;
      padding: 24px 12px;
      overflow: auto;
      backdrop-filter: blur(8px);
    }
    .summary-backdrop[hidden] { display: none !important; }
    .summary-panel {
      max-width: 640px; width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: var(--bg-elev);
      padding: 22px;
      color: var(--ink);
      box-shadow: var(--shadow-lg);
    }
    .summary-panel h2 { margin: 0 0 8px; font-size: 1.2rem; color: var(--accent); }
    .summary-body { font-size: 14px; line-height: 1.55; }
    .summary-body h3 { margin: 18px 0 6px; font-size: 14px; color: var(--ink-dim); }
    .summary-body ul { margin: 4px 0 0 18px; padding: 0; }
    .summary-foot { margin-top: 16px; padding-top: 12px; border-top: 1px solid var(--line-soft); font-size: 12px; color: var(--ink-muted); }
    .summary-close {
      float: right;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.03);
      color: var(--ink-dim);
      border-radius: 10px;
      padding: 6px 12px;
      font: inherit;
      font-size: 13px;
      cursor: pointer;
      margin: 0 0 8px 8px;
    }
    .summary-close:hover { color: var(--ink); }

    .page-title { margin: 12px 0 16px; font-size: clamp(1.4rem, 3vw, 2rem); }

    /* Hidden auth/dashboard shells (JS toggles) */
    [hidden] { display: none !important; }

    #auth-error { color: #f87171; font-size: 14px; }
  </style>
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <div id="levelup-shell" data-page="parent"></div>

  <main id="main" class="container">
    <!-- Auth gate -->
    <div id="auth-gate" class="gate" hidden>
      <h1>Parent dashboard</h1>
      <p>Sign in with your Google account to monitor your students' progress, strengths and gaps.</p>
      <button type="button" id="btn-google-signin" class="btn btn-google btn-lg">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google
      </button>
      <p id="auth-error" hidden></p>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" hidden>
      <h1 class="page-title">Parent dashboard</h1>

      <div class="status-card">
        <p id="status" class="status-card__text">Loading your students…</p>
        <button type="button" id="btn-refresh" class="btn btn-outline btn-sm">Refresh</button>
      </div>

      <!-- Hidden elements kept for backward compatibility with parent-dashboard.js -->
      <div hidden>
        <span id="parent-avatar">P</span>
        <span id="parent-name"></span>
        <button id="btn-signout" type="button"></button>
      </div>

      <div class="students card" style="padding:16px;">
        <div id="student-cards">
          <p class="muted">Loading…</p>
        </div>
      </div>
    </div>

    <!-- Study summary modal -->
    <div id="study-summary-modal" class="summary-backdrop" hidden role="dialog" aria-modal="true" aria-labelledby="study-summary-title">
      <div class="summary-panel">
        <button type="button" class="summary-close" id="study-summary-close">Close</button>
        <h2 id="study-summary-title">Study summary</h2>
        <div class="summary-body" id="study-summary-body"></div>
        <p class="summary-foot" id="study-summary-foot"></p>
      </div>
    </div>
  </main>

  <script src="js/shell/app-shell.js"></script>
  <script src="js/shell/write-parent-tail-scripts.js"></script>
</body>
</html>
