<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LevelUp! Parent Dashboard</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root { --bg:#060b1a; --card:#0f172a; --border:#23314a; --text:#e2e8f0; --muted:#94a3b8; --accent:#5eead4; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:Outfit,system-ui,sans-serif; background:radial-gradient(circle at top,#111827,#020617); color:var(--text); }
    .shell { max-width:960px; margin:0 auto; padding:24px 16px 40px; }
    h1 { margin:0 0 12px; font-size:1.9rem; }
    .card { border:1px solid var(--border); background:rgba(15,23,42,.9); border-radius:14px; padding:14px; margin-bottom:12px; }
    .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    input { background:#020617; color:var(--text); border:1px solid var(--border); border-radius:10px; padding:10px 12px; min-width:220px; }
    button { border:1px solid var(--border); background:#0b1220; color:var(--text); border-radius:10px; padding:10px 12px; cursor:pointer; font:inherit; }
    button.primary { border-color:var(--accent); color:var(--accent); }
    .hint { color:var(--muted); font-size:.9rem; margin-top:8px; }
    .remember { display:flex; align-items:center; gap:6px; color:var(--muted); font-size:.9rem; }
    .details { margin-top: 10px; display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 10px; }
    .mini { border:1px solid #1f2a40; border-radius:10px; padding:10px; background:#0b1220; }
    .mini h4 { margin:0 0 6px; font-size:.9rem; color:#cbd5e1; }
    .chips { display:flex; flex-wrap:wrap; gap:6px; }
    .chip { border:1px solid #273449; border-radius:999px; padding:3px 8px; font-size:.78rem; color:#cbd5e1; }
    .student-card {
      border:1px solid #1f2a40;
      border-radius:12px;
      padding:10px 12px;
      background:#0b1220;
      margin-top:10px;
    }
    .student-toggle {
      width:100%;
      border:none;
      background:transparent;
      color:inherit;
      padding:0;
      text-align:left;
      cursor:pointer;
    }
    .student-head {
      display:flex;
      gap:10px;
      align-items:flex-start;
      justify-content:space-between;
      flex-wrap:wrap;
    }
    .student-card h3 { margin:0 0 4px; font-size:1rem; }
    .name-row { display:flex; gap:8px; align-items:center; }
    .student-avatar {
      width:24px;
      height:24px;
      border-radius:50%;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border:1px solid #35507a;
      color:#bcd6ff;
      font-size:.8rem;
      background:#10213d;
      flex:0 0 24px;
    }
    .divider-dot {
      color:#5f7397;
      margin:0 6px;
    }
    .student-meta { margin:0; }
    .student-summary {
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
      margin-top:8px;
    }
    .student-summary .chip { font-size:.75rem; }
    .student-expand {
      margin-left:auto;
      color:var(--accent);
      font-size:.8rem;
      border:1px solid #2a3a57;
      border-radius:999px;
      padding:2px 8px;
    }
    .student-details { margin-top:10px; }
    .actions-row { margin-top: 10px; display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
    .menu-wrap { margin-left:auto; position:relative; }
    .menu-btn {
      border:1px solid #2a3a57;
      background:#0b1220;
      color:#cbd5e1;
      border-radius:10px;
      padding:6px 10px;
      line-height:1;
      font-size:1rem;
    }
    .menu-panel {
      position:absolute;
      right:0;
      top:calc(100% + 6px);
      min-width:180px;
      border:1px solid #2a3a57;
      border-radius:10px;
      background:#0b1220;
      padding:8px;
      z-index:20;
      box-shadow:0 10px 30px rgba(0,0,0,.35);
    }
    .menu-panel[hidden] { display:none; }
    .menu-panel button { width:100%; text-align:left; }
    .btn-danger {
      border-color:#ef4444;
      color:#fecaca;
      background:#1b0d12;
    }
    .stat-grid {
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:8px;
      margin-bottom:10px;
    }
    .stat-grid .chip { display:block; text-align:center; }
    #student-cards .hint { margin: 0; }
    @media (max-width: 760px) {
      .shell { padding:16px 10px 28px; }
      .row { flex-direction:column; align-items:stretch; }
      input, button { width:100%; min-width:0; }
      .remember { justify-content:flex-start; }
      .stat-grid { grid-template-columns:repeat(2,minmax(0,1fr)); }
      .details { grid-template-columns:1fr; }
      .student-expand { margin-left:0; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <h1>Parent Dashboard</h1>
    <div class="card">
      <div class="row">
        <input id="project-code" placeholder="Project code" value="study-app" />
        <input id="parent-code" type="password" placeholder="Parent access code" />
        <label class="remember"><input type="checkbox" id="remember-code" /> Remember 30 days</label>
        <button id="btn-refresh" class="primary">Load students</button>
        <button id="btn-setup-keys">Supabase keys</button>
      </div>
      <p class="hint" id="status">Configure keys if needed, then load overview.</p>
    </div>
    <div class="card">
      <div id="student-cards">
        <p class="hint">No data yet.</p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    (function () {
      const status = document.getElementById("status");
      const studentCards = document.getElementById("student-cards");
      const btnSetup = document.getElementById("btn-setup-keys");
      const btnRefresh = document.getElementById("btn-refresh");
      const projectCode = document.getElementById("project-code");
      const parentCode = document.getElementById("parent-code");
      const rememberCode = document.getElementById("remember-code");
      const TOKEN_KEY = "PARENT_DASH_TOKEN_V1";
      const TOKEN_EXP_KEY = "PARENT_DASH_TOKEN_EXP_V1";

      function saveToken(token) {
        const exp = Date.now() + 1000 * 60 * 60 * 24 * 30;
        localStorage.setItem(TOKEN_KEY, token);
        localStorage.setItem(TOKEN_EXP_KEY, String(exp));
      }

      function loadToken() {
        const token = (localStorage.getItem(TOKEN_KEY) || "").trim();
        const exp = Number(localStorage.getItem(TOKEN_EXP_KEY) || 0);
        if (!token || !exp || Date.now() > exp) {
          localStorage.removeItem(TOKEN_KEY);
          localStorage.removeItem(TOKEN_EXP_KEY);
          return "";
        }
        return token;
      }

      function clearToken() {
        localStorage.removeItem(TOKEN_KEY);
        localStorage.removeItem(TOKEN_EXP_KEY);
      }

      async function sha256Hex(input) {
        const enc = new TextEncoder().encode(input);
        const digest = await crypto.subtle.digest("SHA-256", enc);
        return Array.from(new Uint8Array(digest))
          .map((b) => b.toString(16).padStart(2, "0"))
          .join("");
      }

      function getKeys() {
        return {
          url: (localStorage.getItem("SUPABASE_URL") || "").trim(),
          key: (localStorage.getItem("SUPABASE_ANON_KEY") || "").trim(),
        };
      }

      function setupKeys() {
        const { url, key } = getKeys();
        const u = prompt("Supabase Project URL:", url || "https://xxxx.supabase.co");
        if (!u) return;
        const k = prompt("Supabase anon/public key:", key || "");
        if (!k) return;
        localStorage.setItem("SUPABASE_URL", u.trim());
        localStorage.setItem("SUPABASE_ANON_KEY", k.trim());
        status.textContent = "Keys saved.";
      }

      function fmt(ts) {
        if (!ts) return "-";
        const d = new Date(ts);
        if (Number.isNaN(d.getTime())) return "-";
        return d.toLocaleString();
      }

      function esc(s) {
        return String(s == null ? "" : s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      function topicList(topics, key) {
        const arr = Array.isArray(topics) ? topics : [];
        if (!arr.length) return "<span class='chip'>none</span>";
        return arr
          .slice(0, 8)
          .map((t) => `<span class="chip">T${esc(t.topic_id)} · ${Number(t[key] || 0)}%</span>`)
          .join("");
      }

      function subjectList(subjects) {
        const arr = Array.isArray(subjects) ? subjects : [];
        if (!arr.length) return "<span class='chip'>none</span>";
        return arr
          .slice(0, 8)
          .map((s) => {
            const id = esc((s && s.subject_id) || "general");
            const xp = Number((s && s.xp) || 0);
            const events = Number((s && s.events) || 0);
            return `<span class="chip">${id} · XP ${xp} · events ${events}</span>`;
          })
          .join("");
      }

      function recentCouponList(rows) {
        const arr = Array.isArray(rows) ? rows : [];
        if (!arr.length) return "<span class='chip'>none</span>";
        return arr
          .slice(0, 8)
          .map((r) => {
            const label = esc(r.reward_label || r.reward_id || "reward");
            const code = esc(r.coupon_code || "-");
            const date = fmt(r.purchased_at);
            const claimed = r.claimed_at ? `Claimed ${fmt(r.claimed_at)}` : "Active";
            return `<span class="chip">${label} · ${Number(r.xp_cost || 0)} XP · ${date} · ${esc(claimed)} · code ${code}</span>`;
          })
          .join("");
      }

      function studentDetailBlocks(s) {
        return `
          <div class="actions-row">
            <div class="menu-wrap">
              <button type="button" class="menu-btn student-menu-toggle" aria-haspopup="true" aria-expanded="false" title="More actions">⋮</button>
              <div class="menu-panel" hidden>
                <button type="button" class="rename-student" data-student-id="${esc(s.student_id || "")}" data-student-name="${esc(s.student_name || s.student_id || "")}">Rename</button>
                <button type="button" class="delete-student btn-danger" data-student-id="${esc(s.student_id || "")}" data-student-name="${esc(s.student_name || s.student_id || "")}">Delete student data</button>
              </div>
            </div>
          </div>
          <div class="details">
            <div class="mini">
              <h4>Last 7 days</h4>
              <div class="chips">
                <span class="chip">XP ${Number(s.xp_last_7d || 0)}</span>
                <span class="chip">Events ${Number(s.xp_events_last_7d || 0)}</span>
              </div>
            </div>
            <div class="mini">
              <h4>Areas studied (overall)</h4>
              <div class="chips">${
                (Array.isArray(s.areas_overall) && s.areas_overall.length)
                  ? s.areas_overall.map((a) => `<span class="chip">${esc(a)}</span>`).join("")
                  : "<span class='chip'>none</span>"
              }</div>
            </div>
            <div class="mini">
              <h4>Areas studied (last week)</h4>
              <div class="chips">${
                (Array.isArray(s.areas_week) && s.areas_week.length)
                  ? s.areas_week.map((a) => `<span class="chip">${esc(a)}</span>`).join("")
                  : "<span class='chip'>none</span>"
              }</div>
            </div>
            <div class="mini">
              <h4>Strong topics</h4>
              <div class="chips">${topicList(s.strong_topics, "mastery")}</div>
            </div>
            <div class="mini">
              <h4>Weak topics</h4>
              <div class="chips">${topicList(s.weak_topics, "mastery")}</div>
            </div>
            <div class="mini">
              <h4>Subjects</h4>
              <div class="chips">${subjectList(s.subject_stats)}</div>
            </div>
            <div class="mini">
              <h4>Recent coupons (verification)</h4>
              <div class="chips">${recentCouponList(s.recent_coupons)}</div>
            </div>
          </div>
        `;
      }

      async function loadData() {
        const { url, key } = getKeys();
        if (!url || !key) {
          status.textContent = "Missing Supabase keys. Click Supabase keys first.";
          return;
        }
        let token = loadToken();
        const pin = (parentCode.value || "").trim();
        if (!token && !pin) {
          status.textContent = "Enter parent access code.";
          return;
        }
        if (!token && pin) token = await sha256Hex(pin);
        status.textContent = "Loading...";
        try {
          const sb = window.supabase.createClient(url, key);
          const { data, error } = await sb.rpc("study_parent_student_overview_token", {
            p_project_code: (projectCode.value || "study-app").trim(),
            p_parent_token: token,
          });
          if (error) throw error;
          if (!data || !data.ok) {
            status.textContent = "Failed: " + ((data && data.error) || "unknown");
            if ((data && data.error) && String(data.error).includes("token")) clearToken();
            return;
          }
          if (rememberCode.checked && token) saveToken(token);
          if (!rememberCode.checked) clearToken();
          const students = Array.isArray(data.students) ? data.students : [];
          if (!students.length) {
            if (studentCards) studentCards.innerHTML = "<p class='hint'>No student rows yet.</p>";
            status.textContent = "Loaded. No students found yet.";
            return;
          }
          if (studentCards) {
            studentCards.innerHTML = students
              .map(
                (s) => `
                  <section class="student-card">
                    <button type="button" class="student-toggle" aria-expanded="false">
                    <div class="student-head">
                      <div>
                        <div class="name-row">
                          <span class="student-avatar">👤</span>
                          <h3>${esc(s.student_name || "Student")}</h3>
                        </div>
                        <p class="hint student-meta">ID: ${esc(s.student_id || "-")}</p>
                      </div>
                      <div class="hint"><span class="divider-dot">•</span> Last activity: ${fmt(s.last_activity)}</div>
                    </div>
                    <div class="student-summary">
                      <span class="chip">XP ${Number(s.xp_balance || 0)}</span>
                      <span class="chip">Events ${Number(s.xp_events || 0)}</span>
                      <span class="chip">Topics ${Number(s.chapters_covered || s.studied_topics || 0)}</span>
                      <span class="chip">Purchases ${Number(s.purchases || 0)}</span>
                      <span class="student-expand">Tap to expand</span>
                    </div>
                  </button>
                  <div class="student-details" hidden>
                    <div class="stat-grid">
                      <span class="chip">XP ${Number(s.xp_balance || 0)}</span>
                      <span class="chip">Events ${Number(s.xp_events || 0)}</span>
                      <span class="chip">Topics ${Number(s.chapters_covered || s.studied_topics || 0)}</span>
                      <span class="chip">Purchases ${Number(s.purchases || 0)}</span>
                    </div>
                    ${studentDetailBlocks(s)}
                  </div>
                  </section>
                `
              )
              .join("");
            studentCards.querySelectorAll(".student-toggle").forEach((btn) => {
              btn.addEventListener("click", () => {
                const details = btn.nextElementSibling;
                if (!details) return;
                const nextHidden = !details.hidden;
                details.hidden = nextHidden;
                btn.setAttribute("aria-expanded", nextHidden ? "false" : "true");
                const expand = btn.querySelector(".student-expand");
                if (expand) expand.textContent = nextHidden ? "Tap to expand" : "Tap to collapse";
              });
            });
            studentCards.querySelectorAll(".student-menu-toggle").forEach((btn) => {
              btn.addEventListener("click", (evt) => {
                evt.stopPropagation();
                const wrap = btn.closest(".menu-wrap");
                const panel = wrap ? wrap.querySelector(".menu-panel") : null;
                if (!panel) return;
                const willOpen = panel.hidden;
                studentCards.querySelectorAll(".menu-panel").forEach((p) => (p.hidden = true));
                studentCards
                  .querySelectorAll(".student-menu-toggle")
                  .forEach((b) => b.setAttribute("aria-expanded", "false"));
                panel.hidden = !willOpen;
                btn.setAttribute("aria-expanded", willOpen ? "true" : "false");
              });
            });
            studentCards.querySelectorAll(".menu-panel").forEach((panel) => {
              panel.addEventListener("click", (evt) => evt.stopPropagation());
            });
            studentCards.querySelectorAll(".rename-student").forEach((btn) => {
              btn.addEventListener("click", async (evt) => {
                evt.stopPropagation();
                const studentId = (btn.dataset.studentId || "").trim();
                const currentName = (btn.dataset.studentName || "").trim();
                if (!studentId) return;
                const parentPanel = btn.closest(".menu-panel");
                if (parentPanel) parentPanel.hidden = true;
                const nextName = prompt("New display name:", currentName);
                if (!nextName || !nextName.trim()) return;
                let token = loadToken();
                const pin = (parentCode.value || "").trim();
                if (!token && pin) token = await sha256Hex(pin);
                if (!token) {
                  status.textContent = "Enter parent access code first.";
                  return;
                }
                try {
                  status.textContent = `Renaming ${studentId}...`;
                  const sb = window.supabase.createClient(getKeys().url, getKeys().key);
                  const { data, error } = await sb.rpc("study_parent_update_student_name_token", {
                    p_project_code: (projectCode.value || "study-app").trim(),
                    p_parent_token: token,
                    p_student_id: studentId,
                    p_new_display_name: nextName.trim(),
                  });
                  if (error) throw error;
                  if (!data || !data.ok) {
                    status.textContent = "Rename failed: " + ((data && data.error) || "unknown");
                    return;
                  }
                  status.textContent = `Renamed ${studentId} to "${data.student_name || nextName.trim()}".`;
                  await loadData();
                } catch (e) {
                  status.textContent = "Rename error: " + (e && e.message ? e.message : String(e));
                }
              });
            });
            studentCards.querySelectorAll(".delete-student").forEach((btn) => {
              btn.addEventListener("click", async (evt) => {
                evt.stopPropagation();
                const parentPanel = btn.closest(".menu-panel");
                if (parentPanel) parentPanel.hidden = true;
                const studentId = (btn.dataset.studentId || "").trim();
                const studentName = (btn.dataset.studentName || studentId).trim();
                if (!studentId) return;
                const confirmName = prompt(
                  `DELETE IS PERMANENT.\nType this exact current student name to confirm:\n\n${studentName}`
                );
                if (confirmName == null) return;
                let token = loadToken();
                const pin = (parentCode.value || "").trim();
                if (!token && pin) token = await sha256Hex(pin);
                if (!token) {
                  status.textContent = "Enter parent access code first.";
                  return;
                }
                try {
                  status.textContent = `Deleting ${studentId}...`;
                  const sb = window.supabase.createClient(getKeys().url, getKeys().key);
                  const { data, error } = await sb.rpc("study_parent_delete_student_token", {
                    p_project_code: (projectCode.value || "study-app").trim(),
                    p_parent_token: token,
                    p_student_id: studentId,
                    p_confirm_name: String(confirmName),
                    p_delete_profile: true,
                  });
                  if (error) throw error;
                  if (!data || !data.ok) {
                    status.textContent = "Delete failed: " + ((data && data.error) || "unknown");
                    return;
                  }
                  status.textContent = `Deleted ${studentId}.`;
                  await loadData();
                } catch (e) {
                  status.textContent = "Delete error: " + (e && e.message ? e.message : String(e));
                }
              });
            });
            if (!window.__parentMenuDocBound) {
              window.__parentMenuDocBound = true;
              document.addEventListener("click", () => {
                studentCards.querySelectorAll(".menu-panel").forEach((p) => (p.hidden = true));
                studentCards
                  .querySelectorAll(".student-menu-toggle")
                  .forEach((b) => b.setAttribute("aria-expanded", "false"));
              });
            }
          }
          status.textContent = `Loaded ${students.length} student(s). Generated at ${fmt(data.generated_at)}.`;
        } catch (e) {
          status.textContent = "Error: " + (e && e.message ? e.message : String(e));
        }
      }

      btnSetup.onclick = setupKeys;
      btnRefresh.onclick = loadData;
      const initialToken = loadToken();
      if (initialToken) {
        rememberCode.checked = true;
        loadData();
      } else {
        // Autofill may populate the code slightly after script execution.
        setTimeout(() => {
          if ((parentCode.value || "").trim()) loadData();
        }, 150);
      }
    })();
  </script>
</body>
</html>
