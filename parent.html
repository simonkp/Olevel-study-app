<!DOCTYPE html>
<html lang="en" data-levelup-build="2026-04-13-9">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LevelUp! Parent Dashboard</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root { --bg:#060b1a; --card:#0f172a; --border:#23314a; --text:#e2e8f0; --muted:#94a3b8; --accent:#5eead4; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:Outfit,system-ui,sans-serif; background:radial-gradient(circle at top,#111827,#020617); color:var(--text); }
    .shell { max-width:960px; margin:0 auto; padding:24px 16px 40px; }
    h1 { margin:0 0 12px; font-size:1.9rem; }
    .card { border:1px solid var(--border); background:rgba(15,23,42,.9); border-radius:14px; padding:14px; margin-bottom:12px; }
    .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    input { background:#020617; color:var(--text); border:1px solid var(--border); border-radius:10px; padding:10px 12px; min-width:220px; }
    button { border:1px solid var(--border); background:#0b1220; color:var(--text); border-radius:10px; padding:10px 12px; cursor:pointer; font:inherit; }
    button.primary { border-color:var(--accent); color:var(--accent); }
    .hint { color:var(--muted); font-size:.9rem; margin-top:8px; }
    .remember { display:flex; align-items:center; gap:6px; color:var(--muted); font-size:.9rem; }
    .details { margin-top: 10px; display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 10px; }
    .mini { border:1px solid #1f2a40; border-radius:10px; padding:10px; background:#0b1220; }
    .mini h4 { margin:0 0 6px; font-size:.9rem; color:#cbd5e1; }
    .chips { display:flex; flex-wrap:wrap; gap:6px; }
    .chip { border:1px solid #273449; border-radius:999px; padding:3px 8px; font-size:.78rem; color:#cbd5e1; }
    .student-card {
      border:1px solid #1f2a40;
      border-radius:12px;
      padding:10px 12px;
      background:#0b1220;
      margin-top:10px;
    }
    .student-toggle {
      width:100%;
      border:none;
      background:transparent;
      color:inherit;
      padding:0;
      text-align:left;
      cursor:pointer;
    }
    .student-head {
      display:flex;
      gap:10px;
      align-items:flex-start;
      justify-content:space-between;
      flex-wrap:wrap;
    }
    .student-card h3 { margin:0 0 4px; font-size:1rem; }
    .name-row { display:flex; gap:8px; align-items:center; }
    .student-avatar {
      width:24px;
      height:24px;
      border-radius:50%;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border:1px solid #35507a;
      color:#bcd6ff;
      font-size:.8rem;
      background:#10213d;
      flex:0 0 24px;
    }
    .divider-dot {
      color:#5f7397;
      margin:0 6px;
    }
    .student-meta { margin:0; }
    .student-summary {
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
      margin-top:8px;
    }
    .student-summary .chip { font-size:.75rem; }
    .student-expand {
      margin-left:auto;
      color:var(--accent);
      font-size:.8rem;
      border:1px solid #2a3a57;
      border-radius:999px;
      padding:2px 8px;
    }
    .student-details { margin-top:10px; }
    .actions-row { margin-top: 10px; display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
    .menu-wrap { margin-left:auto; position:relative; }
    .menu-btn {
      border:1px solid #2a3a57;
      background:#0b1220;
      color:#cbd5e1;
      border-radius:10px;
      padding:6px 10px;
      line-height:1;
      font-size:1rem;
    }
    .menu-panel {
      position:absolute;
      right:0;
      top:calc(100% + 6px);
      min-width:180px;
      border:1px solid #2a3a57;
      border-radius:10px;
      background:#0b1220;
      padding:8px;
      z-index:20;
      box-shadow:0 10px 30px rgba(0,0,0,.35);
    }
    .menu-panel[hidden] { display:none; }
    .menu-panel button { width:100%; text-align:left; }
    .btn-danger {
      border-color:#ef4444;
      color:#fecaca;
      background:#1b0d12;
    }
    .stat-grid {
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:8px;
      margin-bottom:10px;
    }
    .stat-grid .chip { display:block; text-align:center; }
    #student-cards .hint { margin: 0; }
    .top-nav { margin-bottom: 14px; }
    .home-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      color: var(--accent);
      font-size: 0.92rem;
      font-weight: 600;
      border: 1px solid #2a3a57;
      border-radius: 10px;
      padding: 8px 12px;
      background: #0b1220;
    }
    .home-link:hover { border-color: var(--accent); }
    .btn-summary {
      border-color: #2d6a5c;
      color: #5eead4;
      background: #0d1f1c;
      margin-top: 8px;
    }
    .summary-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(5, 7, 22, 0.82);
      z-index: 100;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 24px 12px;
      overflow: auto;
    }
    .summary-backdrop[hidden] { display: none !important; }
    .summary-panel {
      max-width: 640px;
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #0f172a;
      padding: 18px 18px 16px;
      color: var(--text);
      box-shadow: 0 24px 48px rgba(0,0,0,.45);
    }
    .summary-panel h2 { margin: 0 0 8px; font-size: 1.2rem; color: var(--accent); }
    .summary-panel .summary-body { font-size: 0.88rem; line-height: 1.5; }
    .summary-panel .summary-body h3 { margin: 16px 0 6px; font-size: 0.95rem; color: #cbd5e1; }
    .summary-panel .summary-body ul { margin: 4px 0 0 18px; padding: 0; }
    .summary-panel .summary-foot {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid #23314a;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .summary-close {
      float: right;
      margin: 0 0 8px 8px;
    }
    @media (max-width: 760px) {
      .shell { padding:16px 10px 28px; }
      .row { flex-direction:column; align-items:stretch; }
      input, button { width:100%; min-width:0; }
      .remember { justify-content:flex-start; }
      .stat-grid { grid-template-columns:repeat(2,minmax(0,1fr)); }
      .details { grid-template-columns:1fr; }
      .student-expand { margin-left:0; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <nav class="top-nav" aria-label="Primary">
      <a class="home-link" href="index.html">← LevelUp home</a>
    </nav>
    <h1>Parent Dashboard</h1>
    <div class="card">
      <div class="row">
        <input id="project-code" placeholder="Project code" value="study-app" />
        <input id="parent-code" type="password" placeholder="Parent access code" />
        <label class="remember"><input type="checkbox" id="remember-code" /> Remember 30 days</label>
        <button id="btn-refresh" class="primary">Load students</button>
        <button id="btn-setup-keys">Supabase keys</button>
      </div>
      <p class="hint" id="status">Configure keys if needed, then load overview.</p>
    </div>
    <div class="card">
      <div id="student-cards">
        <p class="hint">No data yet.</p>
      </div>
    </div>
    <div id="study-summary-modal" class="summary-backdrop" hidden role="dialog" aria-modal="true" aria-labelledby="study-summary-title">
      <div class="summary-panel">
        <button type="button" class="summary-close" id="study-summary-close">Close</button>
        <h2 id="study-summary-title">Study summary</h2>
        <div class="summary-body" id="study-summary-body"></div>
        <p class="summary-foot" id="study-summary-foot"></p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/shell/asset-version.js"></script>
  <script src="js/shell/write-parent-tail-scripts.js"></script>
</body>
</html>
